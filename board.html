<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AAA Multi-Agent Board — Live</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0a0a14 0%, #1a1a2e 100%);
      color: #e0e0e0;
      min-height: 100vh;
      padding: 20px;
    }
    .header {
      text-align: center;
      margin-bottom: 30px;
    }
    .header h1 {
      font-size: 2.5rem;
      background: linear-gradient(90deg, #D4AF37, #F0D060);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }
    .header .subtitle {
      color: #888;
      font-size: 0.9rem;
    }
    .agents {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 30px;
    }
    .agent {
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .agent.claude { background: rgba(255, 127, 80, 0.2); border: 1px solid #FF7F50; }
    .agent.codex { background: rgba(65, 105, 225, 0.2); border: 1px solid #4169E1; }
    .agent.qwen { background: rgba(147, 112, 219, 0.2); border: 1px solid #9370DB; }
    .board {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      max-width: 1600px;
      margin: 0 auto;
    }
    .column {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 20px;
      min-height: 400px;
    }
    .column-header {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 15px;
      padding-bottom: 10px;
      border-bottom: 2px solid;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .column.todo .column-header { border-color: #FF6B6B; color: #FF6B6B; }
    .column.in-progress .column-header { border-color: #4ECDC4; color: #4ECDC4; }
    .column.review .column-header { border-color: #FFE66D; color: #FFE66D; }
    .column.done .column-header { border-color: #95E1D3; color: #95E1D3; }
    .task-count {
      font-size: 0.8rem;
      background: rgba(255, 255, 255, 0.1);
      padding: 4px 12px;
      border-radius: 12px;
    }
    .task {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 12px;
      border-left: 4px solid;
      transition: transform 0.2s;
    }
    .task:hover {
      transform: translateX(5px);
      background: rgba(255, 255, 255, 0.12);
    }
    .task.high { border-left-color: #FF6B6B; }
    .task.medium { border-left-color: #FFD93D; }
    .task.low { border-left-color: #6BCB77; }
    .task-id {
      font-weight: 700;
      font-size: 0.9rem;
      margin-bottom: 8px;
    }
    .task-desc {
      font-size: 0.85rem;
      color: #bbb;
      margin-bottom: 10px;
      line-height: 1.4;
    }
    .task-meta {
      display: flex;
      gap: 10px;
      font-size: 0.75rem;
      color: #888;
    }
    .task-meta span {
      background: rgba(255, 255, 255, 0.1);
      padding: 2px 8px;
      border-radius: 4px;
    }
    .agent-badge {
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 4px;
      margin-left: auto;
    }
    .agent-badge.claude { background: #FF7F50; color: #000; }
    .agent-badge.codex { background: #4169E1; color: #fff; }
    .agent-badge.qwen { background: #9370DB; color: #fff; }
    .refresh-info {
      text-align: center;
      margin-top: 30px;
      color: #666;
      font-size: 0.85rem;
    }
    .decisions {
      max-width: 1600px;
      margin: 40px auto 0;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 20px;
    }
    .decisions h2 {
      font-size: 1.3rem;
      margin-bottom: 15px;
      color: #D4AF37;
    }
    .decision {
      background: rgba(255, 255, 255, 0.08);
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 8px;
      font-size: 0.85rem;
      border-left: 3px solid #D4AF37;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .loading {
      animation: pulse 1.5s infinite;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🚀 AAA Multi-Agent Board</h1>
    <p class="subtitle">Autonomous Agentic Agility — Live Task-Visualisierung</p>
  </div>

  <div class="agents">
    <div class="agent claude">🟠 Claude <span style="font-weight:400;font-size:0.8rem">Testing, Integration</span></div>
    <div class="agent codex">🔵 Codex <span style="font-weight:400;font-size:0.8rem">Build, Performance</span></div>
    <div class="agent qwen">🟣 Qwen <span style="font-weight:400;font-size:0.8rem">Bug-Fixes, Polish</span></div>
  </div>

  <div class="board">
    <div class="column todo">
      <div class="column-header">
        TODO
        <span class="task-count" id="todo-count">0</span>
      </div>
      <div id="todo-tasks"></div>
    </div>

    <div class="column in-progress">
      <div class="column-header">
        IN PROGRESS
        <span class="task-count" id="in-progress-count">0</span>
      </div>
      <div id="in-progress-tasks"></div>
    </div>

    <div class="column review">
      <div class="column-header">
        REVIEW
        <span class="task-count" id="review-count">0</span>
      </div>
      <div id="review-tasks"></div>
    </div>

    <div class="column done">
      <div class="column-header">
        DONE
        <span class="task-count" id="done-count">0</span>
      </div>
      <div id="done-tasks"></div>
    </div>
  </div>

  <div class="decisions">
    <h2>🧠 MetaClaw Decisions (Live)</h2>
    <div id="decisions-list"></div>
  </div>

  <p class="refresh-info">
    🔄 Aktualisiert alle 10 Sekunden automatisch • Letzte Aktualisierung: <span id="last-update">-</span>
  </p>

  <script>
    // Mock data for demo (replace with actual Nuggets CLI calls via backend)
    const mockBoard = {
      todo: [
        { id: 'TASK-032', desc: 'Three.js Bundle-Size prüfen (Lazy Loading für cosmic_encounter_v1)', priority: 'medium', agent: null },
        { id: 'TASK-033', desc: 'Bug-Fixes aus sprint03-remaining-gaps.md bearbeiten', priority: 'medium', agent: null },
        { id: 'TASK-029', desc: 'Quiz-Fixes: CloseButton aus allen 13 Quiz-Komponenten entfernen', priority: 'high', agent: 'qwen' },
        { id: 'TASK-021', desc: 'DONKI CMEAnalysis + WSA-ENLIL anbinden', priority: 'high', agent: null },
        { id: 'TASK-022', desc: 'NOAA SWPC X-ray/Protonen/Kp anbinden', priority: 'high', agent: null },
      ],
      inProgress: [
        { id: 'TASK-030', desc: 'Cosmic Encounter E2E-Tests laufen lassen', priority: 'high', agent: 'claude' }
      ],
      review: [
        { id: 'TASK-001', desc: 'Implement auth middleware', priority: 'high', agent: null }
      ],
      done: [
        { id: 'TASK-030', desc: 'E2E-Tests grün (encounter-quiz-phase.test.tsx)', priority: 'high', agent: 'claude' },
        { id: 'TASK-031', desc: 'App.tsx Onboarding-Flow verifizieren', priority: 'high', agent: 'claude' }
      ]
    };

    const mockDecisions = [
      { id: 'TASK-031-DONE', text: 'App.tsx Integration verifiziert: cosmic_encounter_v1 Flag wird korrekt geprüft | Schicht: Membran | Gesetze: ✅' },
      { id: 'TASK-030-DONE', text: 'E2E-Tests grün (encounter-quiz-phase.test.tsx) | 1 Test passed, 369ms | Schicht: Membran | Gesetze: ✅' },
      { id: 'TASK-030-033', text: 'Cosmic Encounter Onboarding Sprint | Schicht: Membran + Myzel | Gesetze: ✅ Alle erfüllt' },
      { id: 'TASK-029', text: 'Quiz-Fixes: CloseButton entfernt | Schicht: Membran | UX-Polish' }
    ];

    function getPriorityClass(priority) {
      return priority.toLowerCase();
    }

    function getAgentBadge(agent) {
      if (!agent) return '';
      const agentNames = { claude: '🟠 Claude', codex: '🔵 Codex', qwen: '🟣 Qwen' };
      return `<span class="agent-badge ${agent}">${agentNames[agent]}</span>`;
    }

    function renderTask(task) {
      return `
        <div class="task ${getPriorityClass(task.priority)}">
          <div class="task-id">${task.id} ${getAgentBadge(task.agent)}</div>
          <div class="task-desc">${task.desc}</div>
          <div class="task-meta">
            <span>Priority: ${task.priority}</span>
          </div>
        </div>
      `;
    }

    function renderBoard() {
      document.getElementById('todo-tasks').innerHTML = mockBoard.todo.map(renderTask).join('');
      document.getElementById('in-progress-tasks').innerHTML = mockBoard.inProgress.map(renderTask).join('');
      document.getElementById('review-tasks').innerHTML = mockBoard.review.map(renderTask).join('');
      document.getElementById('done-tasks').innerHTML = mockBoard.done.map(renderTask).join('');

      document.getElementById('todo-count').textContent = mockBoard.todo.length;
      document.getElementById('in-progress-count').textContent = mockBoard.inProgress.length;
      document.getElementById('review-count').textContent = mockBoard.review.length;
      document.getElementById('done-count').textContent = mockBoard.done.length;

      document.getElementById('decisions-list').innerHTML = mockDecisions.map(d => `
        <div class="decision"><strong>${d.id}:</strong> ${d.text}</div>
      `).join('');

      document.getElementById('last-update').textContent = new Date().toLocaleTimeString('de-DE');
    }

    // Initial render
    renderBoard();

    // Auto-refresh every 10 seconds
    setInterval(renderBoard, 10000);
  </script>
</body>
</html>
